<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Preview CV Syaifudin Fendi Prasetyo in a full-screen PDF viewer."
    />
    <title>CV Preview - Syaifudin Fendi Prasetyo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --viewer-bg: #1f2328;
        --toolbar-bg: #2d333b;
        --toolbar-border: rgba(255, 255, 255, 0.12);
        --text: #f0f3f6;
        --muted: #9ea7b3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--viewer-bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
      }

      .pdf-viewer-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        background: var(--viewer-bg);
      }

      .pdf-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        min-height: 56px;
        padding: 0 16px;
        background: var(--toolbar-bg);
        border-bottom: 1px solid var(--toolbar-border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
        z-index: 2;
      }

      .pdf-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .pdf-title span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .pdf-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pdf-action {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        border: 1px solid var(--toolbar-border);
        border-radius: 999px;
        color: var(--text);
        text-decoration: none;
        font-size: 0.88rem;
        background: rgba(255, 255, 255, 0.06);
        transition: 180ms ease;
      }

      .pdf-action:hover {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.14);
        transform: translateY(-1px);
      }

      .pdf-frame-wrap {
        flex: 1;
        min-height: 0;
        background: #34383f;
      }

      .pdf-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 576px) {
        .pdf-toolbar {
          padding: 0 10px;
        }

        .pdf-action span {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="pdf-viewer-shell">
      <header class="pdf-toolbar">
        <div class="pdf-title">
          <i class="bi bi-file-earmark-pdf-fill"></i>
          <span>CV Syaifudin Fendi Prasetyo.pdf</span>
        </div>
        <div class="pdf-actions">
          <a class="pdf-action" href="/" id="back-to-home">
            <i class="bi bi-arrow-left"></i>
            <span>Back</span>
          </a>
          <a
            class="pdf-action"
            href="/cv"
            id="download-cv-pdf"
            download
          >
            <i class="bi bi-download"></i>
            <span>Download</span>
          </a>
        </div>
      </header>
      <section class="pdf-frame-wrap" aria-label="CV PDF preview">
        <iframe
          class="pdf-frame"
          src="/cv#toolbar=1&navpanes=0&view=FitH"
          title="Preview CV Syaifudin Fendi Prasetyo"
        ></iframe>
      </section>
    </main>
  </body>
</html>
